<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serie de Fourier - TP</title>
    <!-- Librerías Externas -->
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Enlace a tu CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Panel Lateral Izquierdo -->
    <div class="sidebar">
        <div>
            <h1>Series de Fourier</h1>
        </div>

        <div class="card">
            <label>Función f(x)</label>
            <input type="text" id="funcion" value="Piecewise((1, (x>=0) & (x<=1)), (-1, (x>-1) & (x<=0)))">
            <span class="help-text">Ej: x**2, Abs(x), Piecewise(...)</span>
        </div>

        <div class="card">
            <label>Cantidad de Armónicos (N)</label>
            <div class="slider-container">
                <input type="range" id="armonicos" min="1" max="50" value="10">
                <span class="n-badge" id="n_val">10</span>
            </div>
        </div>

        <div class="card">
            <h3>Resultados</h3>
            <div class="resultado-a0">
                <strong>Término a₀ : </strong> <span id="a0_val">-</span>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>n</th><th>aₙ</th><th>bₙ</th></tr>
                    </thead>
                    <tbody id="tabla_body"></tbody>
                </table>
            </div>
        </div>

        <button id="btnExportar">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            Exportar CSV
        </button>
        
        <div id="loader">Calculando coeficientes...</div>
    </div>

    <!-- Área Principal de Gráficos -->
    <div class="main-content">
        <div class="graph-container">
            <div id="grafico"></div>
        </div>
    </div>

    <!-- Enlace a tu JavaScript -->
    <script src="script.js"></script>
</body>
</html>
